name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag. Defaults to v<package.json version>."
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease."
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  github_release:
    name: Tag and GitHub release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      sha: ${{ steps.version.outputs.sha }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          export INPUT_TAG="${{ inputs.tag }}"

          node <<'NODE'
          import { execFileSync } from "node:child_process";
          import { readFileSync, writeFileSync } from "node:fs";

          const inputTag = process.env.INPUT_TAG?.trim();
          const outputPath = process.env.GITHUB_OUTPUT;

          function writeValues(values) {
            const lines = Object.entries(values).map(([key, value]) => `${key}=${value}\n`).join("");
            writeFileSync(outputPath, lines, { flag: "a" });
            writeFileSync(".release-version.env", lines.replace(/^tag=/m, "TAG=").replace(/^version=/m, "VERSION=").replace(/^bumped=/m, "BUMPED="));
          }

          function tagExists(tag) {
            try {
              execFileSync("git", ["rev-parse", "--verify", `refs/tags/${tag}`], { stdio: "ignore" });
              return true;
            } catch {
              return false;
            }
          }

          function readJson(path) {
            return JSON.parse(readFileSync(path, "utf8"));
          }

          function writeJson(path, value) {
            writeFileSync(path, `${JSON.stringify(value, null, 2)}\n`);
          }

          if (inputTag) {
            writeValues({ tag: inputTag, version: inputTag.replace(/^v/, ""), bumped: "false" });
            process.exit(0);
          }

          const packageJson = readJson("package.json");
          const match = /^(\d+)\.(\d+)\.(\d+)$/.exec(packageJson.version);
          if (!match) throw new Error(`Unsupported package.json version: ${packageJson.version}`);

          const major = Number(match[1]);
          const minor = Number(match[2]);
          let patch = Number(match[3]);
          let version = `${major}.${minor}.${patch}`;
          let tag = `v${version}`;
          let bumped = false;

          while (tagExists(tag)) {
            patch += 1;
            version = `${major}.${minor}.${patch}`;
            tag = `v${version}`;
            bumped = true;
          }

          if (bumped) {
            packageJson.version = version;
            writeJson("package.json", packageJson);

            const packageLock = readJson("package-lock.json");
            packageLock.version = version;
            if (packageLock.packages?.[""]) packageLock.packages[""].version = version;
            writeJson("package-lock.json", packageLock);

            for (const path of ["manifest.json", "manifests/manifest.firefox.json", "manifests/manifest.chrome.json"]) {
              const manifest = readJson(path);
              manifest.version = version;
              writeJson(path, manifest);
            }
          }

          writeValues({ tag, version, bumped: bumped ? "true" : "false" });
          NODE

          source .release-version.env
          if [[ "$BUMPED" == "true" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add package.json package-lock.json manifest.json manifests/manifest.firefox.json manifests/manifest.chrome.json
            git commit -m "Bump version to $TAG"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi

          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build packages
        run: npm run build

      - name: Generate release notes from git
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          PREVIOUS_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          {
            echo "## Changes"
            echo
            if [[ -n "$PREVIOUS_TAG" ]]; then
              git log --pretty=format:'- %s (%h)' "$PREVIOUS_TAG"..HEAD
            else
              git log --pretty=format:'- %s (%h)'
            fi
            echo
            echo
            echo "## Packages"
            echo
            echo "- Firefox: \`dist/firefox/\`"
            echo "- Chrome: \`dist/chrome/\`"
          } > RELEASE_NOTES.md

      - name: Upload publish workspace
        uses: actions/upload-artifact@v4
        with:
          name: publish-workspace
          path: |
            build/firefox/
            dist/firefox/*.zip
            dist/chrome/*.zip
          if-no-files-found: error

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp dist/firefox/*.zip "release-assets/smart-dark-mode-firefox-${{ steps.version.outputs.version }}.zip"
          cp dist/chrome/*.zip "release-assets/smart-dark-mode-chrome-${{ steps.version.outputs.version }}.zip"

          TAG="${{ steps.notes.outputs.tag }}"
          SHA="${{ steps.version.outputs.sha }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --target "$SHA" --title "$TAG" --notes-file RELEASE_NOTES.md
            gh release upload "$TAG" release-assets/*.zip --clobber
          else
            ARGS=("$TAG" release-assets/*.zip --target "$SHA" --title "$TAG" --notes-file RELEASE_NOTES.md)
            if [[ "${{ inputs.prerelease }}" == "true" ]]; then
              ARGS+=(--prerelease)
            fi
            gh release create "${ARGS[@]}"
          fi

  publish_firefox:
    name: Publish Firefox add-on
    runs-on: ubuntu-latest
    needs: github_release

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.github_release.outputs.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download publish workspace
        uses: actions/download-artifact@v4
        with:
          name: publish-workspace

      - name: Publish to Firefox Add-ons
        env:
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}
        run: node scripts/publish-stores.mjs firefox

  publish_chrome:
    name: Publish Chrome Web Store item
    runs-on: ubuntu-latest
    needs: github_release

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.github_release.outputs.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download publish workspace
        uses: actions/download-artifact@v4
        with:
          name: publish-workspace

      - name: Publish to Chrome Web Store
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: node scripts/publish-stores.mjs chrome
