name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag. Defaults to v<package.json version>."
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease."
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    name: Package, release, and publish
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Generate release notes from git
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          if [[ -z "$TAG" ]]; then
            VERSION="$(node -p "require('./package.json').version")"
            TAG="v${VERSION}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          PREVIOUS_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          {
            echo "## Changes"
            echo
            if [[ -n "$PREVIOUS_TAG" ]]; then
              git log --pretty=format:'- %s (%h)' "$PREVIOUS_TAG"..HEAD
            else
              git log --pretty=format:'- %s (%h)'
            fi
            echo
            echo
            echo "## Packages"
            echo
            echo "- Firefox: \`dist/firefox/\`"
            echo "- Chrome: \`dist/chrome/\`"
          } > RELEASE_NOTES.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          ARGS=("${{ steps.notes.outputs.tag }}" dist/firefox/*.zip dist/chrome/*.zip --target "$GITHUB_SHA" --title "${{ steps.notes.outputs.tag }}" --notes-file RELEASE_NOTES.md)
          if [[ "${{ inputs.prerelease }}" == "true" ]]; then
            ARGS+=(--prerelease)
          fi
          gh release create "${ARGS[@]}"

      - name: Publish to extension stores
        env:
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: node scripts/publish-stores.mjs
