<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
  <script src="config.js" defer></script>
  <script src="popup.js" defer></script>
</head>
<body>
  <header class="hero">
    <img class="mark" src="../icons/icon-32.png" alt="" aria-hidden="true">
    <h1 data-i18n="extensionName">Smart Dark Mode</h1>
  </header>

  <section class="panel global-panel" aria-labelledby="global-title">
    <label class="setting-row primary-toggle">
      <span>
        <strong id="global-title" data-i18n="popupEnabledGlobally">Enabled globally</strong>
        <small data-i18n="popupEnabledGloballyDescription">Turn extension behavior on or off everywhere.</small>
      </span>
      <input id="global-enabled" type="checkbox">
    </label>
  </section>

  <section class="panel auto-panel" aria-labelledby="auto-title">
    <div class="section-heading compact">
      <div>
        <div id="auto-title" class="section-title" data-i18n="popupAutoMode">Auto Mode</div>
        <div class="section-desc" data-i18n="popupAutoModeDescription">Choose whether to darken light pages or lighten dark pages, and tune the threshold.</div>
      </div>
    </div>

    <div class="direction-group" role="radiogroup" aria-labelledby="auto-direction-label">
      <span id="auto-direction-label" class="direction-label" data-i18n="popupAutoDirection">Automatic direction</span>
      <div class="direction-options">
        <label class="direction-option">
          <input type="radio" name="auto-direction" value="dark">
          <span class="direction-text">
            <span class="direction-title" data-i18n="popupAutoDirectionDark">Dark</span>
            <small data-i18n="popupAutoDirectionDarkHint">Darken light pages</small>
          </span>
        </label>
        <label class="direction-option">
          <input type="radio" name="auto-direction" value="light">
          <span class="direction-text">
            <span class="direction-title" data-i18n="popupAutoDirectionLight">Light</span>
            <small data-i18n="popupAutoDirectionLightHint">Lighten dark pages</small>
          </span>
        </label>
      </div>
    </div>

    <label class="slider-setting" for="auto-threshold">
      <span>
        <strong data-i18n="popupAutoThreshold">Inversion threshold</strong>
        <small id="auto-threshold-description" data-i18n="popupAutoThresholdDescription">Higher values only invert brighter pages.</small>
      </span>
      <output id="auto-threshold-value" for="auto-threshold">55%</output>
    </label>
    <input id="auto-threshold" class="threshold-slider" type="range" step="1">
    <div class="slider-labels" aria-hidden="true">
      <span id="auto-threshold-left-label" data-i18n="popupAutoThresholdMorePages">More pages</span>
      <span id="auto-threshold-right-label" data-i18n="popupAutoThresholdFewerPages">Only very light</span>
    </div>
  </section>

  <section class="panel site-panel" aria-labelledby="site-title">
    <div class="section-heading">
      <div>
        <div id="site-title" class="section-title" data-i18n="popupThisSite">This site</div>
        <div id="site-label" class="site" data-i18n="popupLoading">Loading...</div>
      </div>
    </div>

    <div class="mode-group">
      <label class="mode-option">
        <input type="radio" name="site-mode" value="auto">
        <span data-i18n="popupAutomatic">Automatic</span>
      </label>
      <label class="mode-option">
        <input type="radio" name="site-mode" value="inverted">
        <span data-i18n="popupForceInverted">Always inverted</span>
      </label>
      <label class="mode-option">
        <input type="radio" name="site-mode" value="original">
        <span data-i18n="popupForceOriginal">Always original</span>
      </label>
    </div>

    <div id="auto-status" class="auto-status" hidden></div>

    <div class="divider"></div>

    <div class="site-hint" data-i18n="popupSiteSettingsHint">The settings below apply to this site only.</div>

    <label class="setting-row">
      <span>
        <strong data-i18n="popupInvertImages">Invert images</strong>
        <small data-i18n="popupInvertImagesDescription">Leave media inverted with the page instead of restoring original colors.</small>
      </span>
      <input id="invert-images" type="checkbox">
    </label>

    <label class="setting-row">
      <span>
        <strong data-i18n="popupImageShadow">Image shadow</strong>
        <small data-i18n="popupImageShadowDescription">Add a direction-aware shadow around restored images for contrast.</small>
      </span>
      <input id="image-shadow" type="checkbox">
    </label>

    <div id="image-shadow-controls" class="correction-controls" hidden>
      <label class="slider-setting" for="image-shadow-strength">
        <span>
          <strong data-i18n="popupImageShadowStrength">Shadow strength</strong>
        </span>
        <output id="image-shadow-strength-value" for="image-shadow-strength">70%</output>
      </label>
      <input id="image-shadow-strength" class="threshold-slider" type="range" step="1">
    </div>

    <label class="setting-row">
      <span>
        <strong data-i18n="popupCustomCorrection">Custom brightness and contrast</strong>
        <small data-i18n="popupCustomCorrectionDescription">Tune brightness and contrast while pages are inverted.</small>
      </span>
      <input id="custom-correction" type="checkbox">
    </label>

    <div id="custom-correction-controls" class="correction-controls" hidden>
      <label class="slider-setting" for="custom-brightness">
        <span>
          <strong data-i18n="popupBrightness">Brightness</strong>
        </span>
        <output id="custom-brightness-value" for="custom-brightness">106%</output>
      </label>
      <input id="custom-brightness" class="threshold-slider" type="range" step="1">

      <label class="slider-setting correction-slider-setting" for="custom-contrast">
        <span>
          <strong data-i18n="popupContrast">Contrast</strong>
        </span>
        <output id="custom-contrast-value" for="custom-contrast">108%</output>
      </label>
      <input id="custom-contrast" class="threshold-slider" type="range" step="1">
    </div>
  </section>

  <div id="status" class="status"></div>
</body>
</html>
