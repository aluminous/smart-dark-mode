<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
  <script src="popup.js" defer></script>
</head>
<body>
  <h1>Auto Dark Mode</h1>

  <label class="row switch-row">
    <span>
      <strong>Enabled globally</strong>
      <small>Turn extension behavior on or off everywhere.</small>
    </span>
    <input id="global-enabled" type="checkbox">
  </label>

  <section>
    <div class="section-title">This site</div>
    <div id="site-label" class="site">Loading...</div>

    <label class="option">
      <input type="radio" name="site-mode" value="auto">
      <span>Automatic</span>
    </label>
    <label class="option">
      <input type="radio" name="site-mode" value="dark">
      <span>Force dark</span>
    </label>
    <label class="option">
      <input type="radio" name="site-mode" value="light">
      <span>Force light</span>
    </label>
  </section>

  <div id="status" class="status"></div>
</body>
</html>
